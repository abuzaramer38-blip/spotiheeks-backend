# render.yaml — Render.com deployment blueprint
# Commit this file to your repo root and connect it on Render.

services:
  - type: web
    name: spotiheeks-api
    env: node
    region: oregon
    plan: free
    buildCommand: |
      npm install
      pip install yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SPOTIFY_CLIENT_ID
        value: 1697c046b92146e29b69af2870861687
      - key: SPOTIFY_CLIENT_SECRET
        value: 66ef0cd879a444269934c67b632c61b3
      - key: ALLOWED_ORIGIN
        value: https://spotiheeks.com
    healthCheckPath: /health
    autoDeploy: true
